<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">



    <div class="container">



        <a class="navbar-brand" href="/">

            Smart Inventory

        </a>



        <div>



            <a href="/" class="btn btn-outline-light me-2">

                Dashboard

            </a>



            <a href="/products" class="btn btn-outline-light me-2">

                Products

            </a>



            <a href="/add-product" class="btn btn-success">

                Add Product

            </a>



        </div>



    </div>



</nav>



<div class="container">



        <a class="navbar-brand" href="/">

            Smart Inventory

        </a>



        <div>



            <a href="/" class="btn btn-outline-light me-2">

                Dashboard

            </a>



            <a href="/products" class="btn btn-outline-light me-2">

                Products

            </a>



            <a href="/add-product" class="btn btn-success">

                Add Product

            </a>



        </div>



    </div>



</nav>

<div class="container-fluid">

        <a class="navbar-brand" href="/">
            📦 StockSphere
        </a>

        <button class="navbar-toggler"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">

                    <a class="nav-link"
                       href="/">
                        Dashboard
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/products">
                        Products
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/add-product">
                        Add Product
                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <h2 class="mb-4">

        <i class="bi bi-plus-circle"></i>

        Add Product

    </h2>

    <form th:action="@{/save-product}" th:object="${product}" method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Product Name</label>
            <input type="text" class="form-control" th:field="*{productName}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Category</label>
            <input type="text" class="form-control" th:field="*{category}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Price</label>
            <input type="number" step="0.01" class="form-control" th:field="*{price}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Quantity</label>
            <input type="number" class="form-control" th:field="*{quantity}" required>
        </div>

        <button
                class="btn btn-success">

            <i class="bi bi-floppy"></i>

            Save Product

        </button>
    </form>

</div>

</body>
</html>
