<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Add Product | StockSphere</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">

    <div class="container">

        <a class="navbar-brand fw-bold"
           href="/">
            📦 StockSphere
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link"
                       href="/">
                        Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="/products">
                        Products
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active"
                       href="/add-product">
                        Add Product
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow">

                <div class="card-header bg-success text-white">

                    <h3>

                        <i class="bi bi-plus-circle"></i>

                        Add / Edit Product

                    </h3>

                </div>

                <div class="card-body">

                    <form th:action="@{/save-product}"
                          th:object="${product}"
                          method="post"
                          enctype="multipart/form-data">

                        <input type="hidden"
                               th:field="*{id}">

                        <div class="mb-3">

                            <label class="form-label">
                                Product Name
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{productName}"
                                   placeholder="Enter Product Name"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Category
                            </label>

                            <select class="form-select"
                                    th:field="*{category}"
                                    required>

                                <option value="">
                                    Select Category
                                </option>

                                <option value="Electronics">
                                    Electronics
                                </option>

                                <option value="Food">
                                    Food
                                </option>

                                <option value="Clothes">
                                    Clothes
                                </option>

                            </select>

                        </div>

                        <div class="row">

                            <div class="col-md-6">

                                <div class="mb-3">

                                    <label class="form-label">
                                        Price
                                    </label>

                                    <input type="number"
                                           step="0.01"
                                           class="form-control"
                                           th:field="*{price}"
                                           required>

                                </div>

                            </div>

                            <div class="col-md-6">

                                <div class="mb-3">

                                    <label class="form-label">
                                        Quantity
                                    </label>

                                    <input type="number"
                                           class="form-control"
                                           th:field="*{quantity}"
                                           required>

                                </div>

                            </div>
                            <!-- Product Image -->
                            <div class="col-12">

                                <div class="mb-3">

                                    <label class="form-label">
                                        Product Image
                                    </label>

                                    <input type="file"
                                           name="image"
                                           class="form-control"
                                           accept="image/*">

                                    <small class="text-muted">
                                        Leave empty while editing to keep the existing image.
                                    </small>

                                </div>

                            </div>

                            <!-- Current Image (Edit Mode) -->
                            <div class="col-12"
                                 th:if="${product.imageName != null}">

                                <div class="mb-3">

                                    <label class="form-label">
                                        Current Image
                                    </label>

                                    <br>

                                    <img th:src="@{'/uploads/' + ${product.imageName}}"
                                         width="120"
                                         height="120"
                                         class="rounded shadow">

                                </div>

                            </div>

                        </div>

                        <div class="mt-4 d-flex gap-2">

                            <button type="submit"
                                    class="btn btn-success">

                                <i class="bi bi-floppy"></i>
                                Save Product

                            </button>

                            <a href="/products"
                               class="btn btn-secondary">

                                <i class="bi bi-arrow-left"></i>
                                Back

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
