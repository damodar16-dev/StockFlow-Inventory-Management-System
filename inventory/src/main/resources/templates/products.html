<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Products</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container-fluid">

        <a class="navbar-brand" href="/">
            📦 StockSphere
        </a>

        <button class="navbar-toggler"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">

                    <a class="nav-link"
                       href="/">
                        Dashboard
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/products">
                        Products
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/add-product">
                        Add Product
                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>Product List</h2>

        <a href="/add-product" class="btn btn-success">
            + Add Product
        </a>

    </div>

    <form th:action="@{/search}" method="get" class="mb-4">

        <div class="input-group">

            <input
                    type="text"
                    name="keyword"
                    class="form-control"
                    placeholder="Search Product">

            <button class="btn btn-primary" type="submit">
                Search
            </button>

        </div>

    </form>

    <table class="table table-hover table-striped table-bordered shadow">

        <thead class="table-dark">

        <tr>

            <th>ID</th>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Action</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="product : ${products}">

            <td th:text="${product.id}"></td>
            <td th:text="${product.productName}"></td>
            <td th:text="${product.category}"></td>
            <td th:text="${product.price}"></td>
            <td th:text="${product.quantity}"></td>

            <td>

                <a th:href="@{/edit-product/{id}(id=${product.id})}"
                   class="btn btn-warning btn-sm">

                    <i class="bi bi-pencil-square"></i>

                    Edit

                </a>

                <a th:href="@{/delete-product/{id}(id=${product.id})}"

                   class="btn btn-danger btn-sm"

                   onclick="return confirm('Delete Product?')">

                    <i class="bi bi-trash"></i>

                    Delete

                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>

</html>
