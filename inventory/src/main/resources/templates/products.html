<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Products | StockSphere</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            background:#f8f9fa;
        }

        .table tbody tr:hover{
            background:#f1f5ff;
            transition:.3s;
        }

        img{
            object-fit:cover;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand fw-bold"
           href="/">
            📦 StockSphere
        </a>

        <button class="navbar-toggler"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="menu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a href="/"
                       class="nav-link">
                        Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a href="/products"
                       class="nav-link active">
                        Products
                    </a>
                </li>

                <li class="nav-item">
                    <a href="/add-product"
                       class="nav-link">
                        Add Product
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>

            <i class="bi bi-box-seam"></i>

            Product List

        </h2>

        <a href="/add-product"
           class="btn btn-success">

            <i class="bi bi-plus-circle"></i>

            Add Product

        </a>

    </div>

    <!-- Success Message -->

    <div class="alert alert-success alert-dismissible fade show"
         th:if="${success}">

        <span th:text="${success}"></span>

        <button class="btn-close"
                data-bs-dismiss="alert">
        </button>

    </div>

    <!-- Search -->

    <form th:action="@{/search}"
          method="get"
          class="mb-4">

        <div class="input-group">

            <input type="text"
                   name="keyword"
                   class="form-control"
                   placeholder="Search Product">

            <button class="btn btn-primary">

                <i class="bi bi-search"></i>

                Search

            </button>

        </div>

    </form>

    <!-- Sorting -->

    <div class="mb-3">

        <a href="/sort/name"
           class="btn btn-secondary">

            Sort Name

        </a>

        <a href="/sort/price"
           class="btn btn-secondary">

            Sort Price

        </a>

        <a href="/products"
           class="btn btn-dark">

            Reset

        </a>

    </div>

    <!-- Category -->

    <div class="mb-4">

        <a href="/category?category=Electronics"
           class="btn btn-primary">

            Electronics

        </a>

        <a href="/category?category=Food"
           class="btn btn-success">

            Food

        </a>

        <a href="/category?category=Clothes"
           class="btn btn-warning">

            Clothes

        </a>

    </div>

    <table class="table table-bordered table-hover shadow">

        <thead class="table-dark">

        <tr>

            <th>ID</th>
            <th>Image</th>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Action</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="product : ${products}">
            <!-- ID -->
            <td th:text="${product.id}"></td>

            <!-- Image -->
            <td>

                <img th:if="${product.imageName != null}"
                     th:src="@{'/uploads/' + ${product.imageName}}"
                     width="70"
                     height="70"
                     class="rounded shadow">

                <span th:if="${product.imageName == null}">
                    No Image
                </span>

            </td>

            <!-- Product Name -->
            <td th:text="${product.productName}"></td>

            <!-- Category -->
            <td th:text="${product.category}"></td>

            <!-- Price -->
            <td>
                ₹ <span th:text="${product.price}"></span>
            </td>

            <!-- Quantity -->
            <td>

                <span th:if="${product.quantity > 10}"
                      class="badge bg-success"
                      th:text="${product.quantity}">
                </span>

                <span th:if="${product.quantity <= 10 && product.quantity > 0}"
                      class="badge bg-warning text-dark"
                      th:text="${product.quantity}">
                </span>

                <span th:if="${product.quantity == 0}"
                      class="badge bg-danger">
                    OUT OF STOCK
                </span>

            </td>

            <!-- Action -->
            <td>

                <a th:href="@{/edit-product/{id}(id=${product.id})}"
                   class="btn btn-warning btn-sm">

                    <i class="bi bi-pencil-square"></i>
                    Edit

                </a>

                <a th:href="@{/delete-product/{id}(id=${product.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Delete this product?')">

                    <i class="bi bi-trash"></i>
                    Delete

                </a>

            </td>

        </tr>

        </tbody>

    </table>
    <!-- Pagination -->

    <nav th:if="${totalPages != null and totalPages > 1}"
         class="mt-4">

        <ul class="pagination justify-content-center">

            <!-- Previous -->
            <li class="page-item"
                th:classappend="${currentPage == 0} ? 'disabled'">

                <a class="page-link"
                   th:href="@{/products(page=${currentPage-1})}">
                    Previous
                </a>

            </li>

            <!-- Page Numbers -->
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0,totalPages-1)}"
                th:classappend="${i==currentPage} ? 'active'">

                <a class="page-link"
                   th:text="${i+1}"
                   th:href="@{/products(page=${i})}">
                </a>

            </li>

            <!-- Next -->
            <li class="page-item"
                th:classappend="${currentPage==totalPages-1} ? 'disabled'">

                <a class="page-link"
                   th:href="@{/products(page=${currentPage+1})}">
                    Next
                </a>

            </li>

        </ul>

    </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
