<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Dashboard | StockSphere</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            📦 StockSphere
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link active" href="/">
                        <i class="bi bi-speedometer2"></i>
                        Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/products">
                        <i class="bi bi-box-seam"></i>
                        Products
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/add-product">
                        <i class="bi bi-plus-circle"></i>
                        Add Product
                    </a>
                </li>

                <li class="nav-item ms-3">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-danger btn-sm">
                            <i class="bi bi-box-arrow-right"></i>
                            Logout
                        </button>
                    </form>
                </li>

            </ul>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <h2 class="mb-4">
        <i class="bi bi-speedometer2"></i>
        Dashboard
    </h2>

    <div class="row">

        <div class="col-md-3 mb-4">
            <div class="card text-white bg-primary shadow">
                <div class="card-body text-center">
                    <h5>Total Products</h5>
                    <h2 th:text="${totalProducts}">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-4">
            <div class="card text-white bg-success shadow">
                <div class="card-body text-center">
                    <h5>Categories</h5>
                    <h2 th:text="${categories}">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-4">
            <div class="card text-white bg-warning shadow">
                <div class="card-body text-center">
                    <h5>Low Stock</h5>
                    <h2 th:text="${lowStock}">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-4">
            <div class="card text-white bg-danger shadow">
                <div class="card-body text-center">
                    <h5>Inventory Value</h5>
                    <h4>₹ <span th:text="${inventoryValue}">0</span></h4>
                </div>
            </div>
        </div>

    </div>

    <div class="row">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header fw-bold">
                    Inventory Overview
                </div>

                <div class="card-body">
                    <canvas id="inventoryChart"></canvas>
                </div>

            </div>

        </div>

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header fw-bold">
                    Stock Status
                </div>

                <div class="card-body">
                    <canvas id="stockChart"></canvas>
                </div>

            </div>

        </div>

    </div>
    <div class="text-center mt-4">

        <a href="/products" class="btn btn-primary me-2">
            <i class="bi bi-box-seam"></i>
            View Products
        </a>

        <a href="/add-product" class="btn btn-success">
            <i class="bi bi-plus-circle"></i>
            Add Product
        </a>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script th:inline="javascript">

    const totalProducts = [[${totalProducts}]];
    const categories = [[${categories}]];
    const lowStock = [[${lowStock}]];

    new Chart(document.getElementById("inventoryChart"), {

        type: "bar",

        data: {

            labels: ["Products", "Categories", "Low Stock"],

            datasets: [{

                label: "Inventory",

                data: [totalProducts, categories, lowStock]

            }]

        }

    });

    new Chart(document.getElementById("stockChart"), {

        type: "pie",

        data: {

            labels: ["Low Stock", "Available"],

            datasets: [{

                data: [lowStock, totalProducts - lowStock]

            }]

        }

    });

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
