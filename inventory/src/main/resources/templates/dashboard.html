<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Products | StockSphere</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        table tbody tr:hover{
            background:#f8f9fa;
            transition:.3s;
        }

    </style>

</head>

<body class="bg-light">

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            📦 StockSphere
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto align-items-center">

                <li class="nav-item">

                    <a class="nav-link"
                       href="/">

                        <i class="bi bi-speedometer2"></i>

                        Dashboard

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link active"
                       href="/products">

                        <i class="bi bi-box-seam"></i>

                        Products

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/add-product">

                        <i class="bi bi-plus-circle"></i>

                        Add Product

                    </a>

                </li>

                <li class="nav-item ms-3">

                    <form th:action="@{/logout}" method="post">

                        <button type="submit"
                                class="btn btn-danger btn-sm">

                            <i class="bi bi-box-arrow-right"></i>

                            Logout

                        </button>

                    </form>

                </li>

            </ul>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>

            <i class="bi bi-box-seam"></i>

            Product List

        </h2>

        <a href="/add-product"
           class="btn btn-success">

            <i class="bi bi-plus-circle"></i>

            Add Product

        </a>

    </div>

    <!-- Success Message -->

    <div th:if="${success}"
         class="alert alert-success alert-dismissible fade show"
         role="alert">

        <i class="bi bi-check-circle-fill"></i>

        <span th:text="${success}"></span>

        <button type="button"
                class="btn-close"
                data-bs-dismiss="alert">
        </button>

    </div>

    <!-- Search -->

    <form th:action="@{/search}" method="get" class="mb-4">

        <div class="input-group">

            <input
                    type="text"
                    name="keyword"
                    class="form-control"
                    placeholder="Search Product...">

            <button class="btn btn-primary">

                <i class="bi bi-search"></i>

                Search

            </button>

        </div>

    </form>

    <!-- Sort Buttons -->

    <div class="mb-3">

        <a href="/sort/name"
           class="btn btn-secondary">

            Sort Name

        </a>

        <a href="/sort/price"
           class="btn btn-secondary">

            Sort Price

        </a>

        <a href="/products"
           class="btn btn-dark">

            Reset

        </a>

    </div>

    <!-- Category -->

    <div class="mb-4">

        <a href="/category?category=Electronics"
           class="btn btn-primary">

            Electronics

        </a>

        <a href="/category?category=Food"
           class="btn btn-success">

            Food

        </a>

        <a href="/category?category=Clothes"
           class="btn btn-warning">

            Clothes

        </a>

    </div>

    <table class="table table-hover table-striped table-bordered shadow">

        <thead class="table-dark">

        <tr>

            <th>ID</th>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Action</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="product : ${products}">

            <td th:text="${product.id}"></td>

            <td th:text="${product.productName}"></td>

            <td th:text="${product.category}"></td>

            <td>

                ₹ <span th:text="${product.price}"></span>

            </td>
            <td>

                <span
                        th:if="${product.quantity > 10}"
                        class="badge bg-success"
                        th:text="${product.quantity}">
                </span>

                <span
                        th:if="${product.quantity <= 10 && product.quantity > 0}"
                        class="badge bg-warning text-dark"
                        th:text="${product.quantity}">
                </span>

                <span
                        th:if="${product.quantity == 0}"
                        class="badge bg-danger">
                    OUT OF STOCK
                </span>

            </td>

            <td>

                <a th:href="@{/edit-product/{id}(id=${product.id})}"
                   class="btn btn-warning btn-sm">

                    <i class="bi bi-pencil-square"></i>

                    Edit

                </a>

                <a th:href="@{/delete-product/{id}(id=${product.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Delete this product?')">

                    <i class="bi bi-trash"></i>

                    Delete

                </a>

            </td>

        </tr>

        </tbody>

    </table>

    <div class="mt-4 text-center">

        <a href="/"
           class="btn btn-outline-primary me-2">

            <i class="bi bi-speedometer2"></i>

            Dashboard

        </a>

        <a href="/add-product"
           class="btn btn-success">

            <i class="bi bi-plus-circle"></i>

            Add Product

        </a>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
